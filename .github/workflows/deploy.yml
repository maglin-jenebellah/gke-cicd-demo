name: Build and Deploy to GKE
on:
  push:
    branches: [ main ]

permissions:
  id-token: write # Required for OIDC handshake
  contents: read  # Required to checkout repository

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: 'Authenticate to Google Cloud'
      id: 'auth'
      uses: 'google-github-actions/auth@v2'
      with:
        # Using the v2 pool we just created in Cloud Shell
        workload_identity_provider: 'projects/196053730058/locations/global/workloadIdentityPools/github-pool-v2/providers/github-provider'
        service_account: '196053730058-compute@developer.gserviceaccount.com'

    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v2'
      with:
        # CRITICAL: This installs the plugin required for GKE authentication
        install_components: 'gke-gcloud-auth-plugin'

    - name: 'Docker Auth'
      run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

    - name: 'Build and Push'
      run: |
        docker build -t us-central1-docker.pkg.dev/internal-sandbox-446612/my-repo/python-app:${{ github.sha }} .
        docker push us-central1-docker.pkg.dev/internal-sandbox-446612/my-repo/python-app:${{ github.sha }}

    - name: 'Deploy to GKE'
      env:
        # Force kubectl to use the new authentication plugin
        USE_GKE_GCLOUD_AUTH_PLUGIN: 'True'
      run: |
        # Explicitly set the project to internal-sandbox-446612
        gcloud container clusters get-credentials demo-cluster \
            --region us-central1 \
            --project internal-sandbox-446612
            
        # Update the deployment manifest with the new image tag
        sed -i "s|IMAGE_NAME|us-central1-docker.pkg.dev/internal-sandbox-446612/my-repo/python-app:${{ github.sha }}|g" k8s-deploy.yaml
        
        # Apply changes to Kubernetes
        kubectl apply -f k8s-deploy.yaml
        
        # Final verification: wait for the pods to be healthy
        kubectl rollout status deployment/python-app-deployment
