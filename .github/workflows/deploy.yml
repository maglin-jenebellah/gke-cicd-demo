name: Build and Deploy to GKE
on:
  push:
    branches: [ main ]

permissions:
  id-token: write # Required for OIDC
  contents: read  # Required for checkout

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: 'Authenticate to Google Cloud'
      id: 'auth'
      uses: 'google-github-actions/auth@v2'
      with:
        # Note: Using your Project Number 196053730058 and github-pool-v2
        workload_identity_provider: 'projects/196053730058/locations/global/workloadIdentityPools/github-pool-v2/providers/github-provider'
        service_account: '196053730058-compute@developer.gserviceaccount.com'

    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v2'

    - name: 'Docker Auth'
      run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

    - name: 'Build and Push'
      run: |
        docker build -t us-central1-docker.pkg.dev/internal-sandbox-446612/my-repo/python-app:${{ github.sha }} .
        docker push us-central1-docker.pkg.dev/internal-sandbox-446612/my-repo/python-app:${{ github.sha }}

    - name: 'Deploy to GKE'
      run: |
        gcloud container clusters get-credentials demo-cluster --region us-central1
        # Replace IMAGE_NAME placeholder with the actual image we just pushed
        sed -i "s|IMAGE_NAME|us-central1-docker.pkg.dev/internal-sandbox-446612/my-repo/python-app:${{ github.sha }}|g" k8s-deploy.yaml
        kubectl apply -f k8s-deploy.yaml
        # Wait for the rollout to finish so we know it's healthy
        kubectl rollout status deployment/python-app-deployment
